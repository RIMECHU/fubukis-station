<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Jester hat -->
  <path d="M15,50 Q20,5 50,10 Q80,5 85,50" fill="#222"/>
  <!-- Hat bumps -->
  <circle cx="22" cy="22" r="10" fill="#222"/>
  <circle cx="78" cy="22" r="10" fill="#222"/>
  <circle cx="22" cy="22" r="5" fill="#ff66aa"/>
  <circle cx="78" cy="22" r="5" fill="#ff66aa"/>
  <!-- Ears -->
  <path d="M18,45 L8,30 L25,40 Z" fill="#222"/>
  <path d="M82,45 L92,30 L75,40 Z" fill="#222"/>
  <!-- Face (white) -->
  <ellipse cx="50" cy="55" rx="30" ry="28" fill="#fefefe"/>
  <!-- Skull mark on forehead -->
  <path d="M42,38 L50,32 L58,38 L55,46 L45,46 Z" fill="#ff66aa" opacity="0.8"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="55" rx="5" ry="6" fill="#222"/>
  <ellipse cx="62" cy="55" rx="5" ry="6" fill="#222"/>
  <!-- Eye highlights -->
  <circle cx="36" cy="53" r="2" fill="white"/>
  <circle cx="60" cy="53" r="2" fill="white"/>
  <!-- Eyelashes -->
  <line x1="33" y1="50" x2="35" y2="52" stroke="#222" stroke-width="1.5"/>
  <line x1="31" y1="52" x2="33" y2="54" stroke="#222" stroke-width="1.5"/>
  <line x1="67" y1="50" x2="65" y2="52" stroke="#222" stroke-width="1.5"/>
  <line x1="69" y1="52" x2="67" y2="54" stroke="#222" stroke-width="1.5"/>
  <!-- Nose -->
  <ellipse cx="50" cy="62" rx="2.5" ry="2" fill="#ff66aa"/>
  <!-- Mouth -->
  <path d="M46,66 Q50,70 54,66" fill="none" stroke="#555" stroke-width="1.2"/>
  <!-- Blush -->
  <ellipse cx="30" cy="62" rx="4" ry="2.5" fill="#ffcccc" opacity="0.5"/>
  <ellipse cx="70" cy="62" rx="4" ry="2.5" fill="#ffcccc" opacity="0.5"/>
</svg>
